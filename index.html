<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Моя Змійка: Про</title>
    <style>
        body {
            margin: 0;
            background-color: #1a1a1a;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            touch-action: manipulation;
        }
        .header-panel {
            width: 400px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            padding: 0 5px;
            box-sizing: border-box;
        }
        #score-board {
            font-size: 24px;
            font-weight: bold;
        }
        .pause-btn {
            background-color: #555;
            color: white;
            border: none;
            padding: 8px 18px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 15px;
            cursor: pointer;
        }
        .pause-btn:active {
            background-color: #777;
        }
        .canvas-container {
            position: relative;
            width: 400px;
            height: 400px;
        }
        canvas {
            background-color: #111;
            border: 4px solid #333;
            border-radius: 8px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        #start-screen {
            position: absolute;
            top: 0; left: 0; width: 400px; height: 400px;
            background: rgba(0, 0, 0, 0.85);
            border: 4px solid transparent;
            box-sizing: border-box;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }
        .start-btn {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 15px 35px;
            font-size: 22px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(76, 175, 80, 0.4);
        }
        .controls {
            margin-top: 15px;
            display: grid;
            grid-template-columns: repeat(3, 75px);
            grid-template-rows: repeat(2, 75px);
            gap: 10px;
            justify-content: center;
        }
        .btn {
            background-color: #333;
            color: white;
            border: none;
            border-radius: 50%;
            font-size: 26px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .btn:active {
            background-color: #555;
        }
        #btn-up { grid-column: 2; grid-row: 1; }
        #btn-left { grid-column: 1; grid-row: 2; }
        #btn-down { grid-column: 2; grid-row: 2; }
        #btn-right { grid-column: 3; grid-row: 2; }
    </style>
</head>
<body>

    <div class="header-panel">
        <div id="score-board">Рахунок: <span id="score">0</span></div>
        <button class="pause-btn" id="pause-button">ПАУЗА ⏸️</button>
    </div>
    
    <div class="canvas-container">
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div id="start-screen">
            <button class="start-btn" id="start-button">СТАРТ</button>
        </div>
    </div>

    <div class="controls">
        <button class="btn" id="btn-up">↑</button>
        <button class="btn" id="btn-left">←</button>
        <button class="btn" id="btn-down">↓</button>
        <button class="btn" id="btn-right">→</button>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");
        const startScreen = document.getElementById("start-screen");
        const startButton = document.getElementById("start-button");
        const pauseButton = document.getElementById("pause-button");

        const gridSize = 16; 
        const tileCount = canvas.width / gridSize; // 25x25 клітинок

        let snake = [];
        let regularApple = { x: 0, y: 0, emoji: '🍎', value: 1 };
        let customItem = null; // Буде містити або супер-бустер, або декрезор
        
        let dx = 1; 
        let dy = 0;
        let score = 0;
        let gameInterval = null;
        let isPlaying = false;
        let isPaused = false;
        let segmentsToAdd = 0;

        const boosters = [
            { emoji: '🍌', min: 2, max: 10 }, { emoji: '🍇', min: 2, max: 10 },
            { emoji: '🍓', min: 2, max: 10 }, { emoji: '🍉', min: 2, max: 10 },
            { emoji: ' Pineapple 🍍', min: 2, max: 10 }, { emoji: '🍒', min: 2, max: 10 },
            { emoji: '🥝', min: 2, max: 10 }, { emoji: '🍑', min: 2, max: 10 },
            { emoji: '🍊', min: 2, max: 10 }, { emoji: '🍈', min: 2, max: 10 }
        ];

        const decreasors = [
            { emoji: '🍔', min: 1, max: 10 },
            { emoji: '🍟', min: 1, max: 10 },
            { emoji: '🍕', min: 1, max: 10 }
        ];

        function initGame() {
            snake = [{x: 5, y: 12}, {x: 4, y: 12}, {x: 3, y: 12}];
            dx = 1;
            dy = 0;
            score = 0;
            segmentsToAdd = 0;
            isPaused = false;
            scoreElement.innerText = score;
            pauseButton.innerText = "ПАУЗА ⏸️";
            spawnItemsPairs();
            draw();
        }

        function startGame() {
            if (isPlaying && !isPaused) return;
            
            if (isPaused) {
                togglePause();
                return;
            }

            initGame();
            isPlaying = true;
            startScreen.style.display = "none";
            gameInterval = setInterval(update, 130);
        }

        function togglePause() {
            if (!isPlaying) return;
            if (!isPaused) {
                isPaused = true;
                clearInterval(gameInterval);
                pauseButton.innerText = "ПРОДОВЖИТИ ▶️";
                // Візуальна позначка паузи
                ctx.fillStyle = "rgba(0, 0, 0, 0.5)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.font = "30px Arial";
                ctx.fillStyle = "white";
                ctx.textAlign = "center";
                ctx.fillText("ПАУЗА", canvas.width / 2, canvas.height / 2);
            } else {
                isPaused = false;
                pauseButton.innerText = "ПАУЗА ⏸️";
                gameInterval = setInterval(update, 130);
            }
        }

        function gameOver() {
            isPlaying = false;
            clearInterval(gameInterval);
            startButton.innerText = "ГРАТИ ЗНОВУ";
            startScreen.style.display = "flex";
        }

        function getRandPos() {
            return {
                x: Math.floor(Math.random() * tileCount),
                y: Math.floor(Math.random() * tileCount)
            };
        }

        function isOccupied(pos) {
            if (snake.some(s => s.x === pos.x && s.y === pos.y)) return true;
            return false;
        }

        function spawnItemsPairs() {
            // 1. Спавн стандартного яблука
            let applePos = getRandPos();
            while (isOccupied(applePos)) { applePos = getRandPos(); }
            regularApple.x = applePos.x;
            regularApple.y = applePos.y;

            // 2. Спавн кастомного об'єкта (бустер або декрезор)
            const isBooster = Math.random() > 0.35; // 65% бустер, 35% декрезор
            let target = {};

            if (isBooster) {
                const b = boosters[Math.floor(Math.random() * boosters.length)];
                const val = Math.floor(Math.random() * (b.max - b.min + 1)) + b.min;
                target = { type: 'booster', emoji: b.emoji, value: val };
            } else {
                const d = decreasors[Math.floor(Math.random() * decreasors.length)];
                const val = Math.floor(Math.random() * (d.max - d.min + 1)) + d.min;
                target = { type: 'decreasor', emoji: d.emoji, value: val };
            }

            let customPos = getRandPos();
            // Перевірка, щоб не перетнулося зі змійкою та першим яблуком
            while (isOccupied(customPos) || (customPos.x === regularApple.x && customPos.y === regularApple.y)) {
                customPos = getRandPos();
            }
            
            target.x = customPos.x;
            target.y = customPos.y;
            customItem = target;
        }

        function update() {
            if (isPaused) return;

            let nextX = snake[0].x + dx;
            let nextY = snake[0].y + dy;

            // Проходження крізь стіни
            if (nextX < 0) nextX = tileCount - 1;
            if (nextX >= tileCount) nextX = 0;
            if (nextY < 0) nextY = tileCount - 1;
            if (nextY >= tileCount) nextY = 0;

            const head = { x: nextX, y: nextY };

            if (collision(head)) {
                gameOver();
                return;
            }

            snake.unshift(head);
            let ate = false;

            // Перевірка 1: З'їли звичайне яблуко
            if (head.x === regularApple.x && head.y === regularApple.y) {
                score += regularApple.value;
                ate = true;
            } 
            // Перевірка 2: З'їли кастомний бонус/фастфуд
            else if (head.x === customItem.x && head.y === customItem.y) {
                ate = true;
                if (customItem.type === 'booster') {
                    score += customItem.value;
                    segmentsToAdd += (customItem.value - 1);
                } else if (customItem.type === 'decreasor') {
                    score = Math.max(0, score - customItem.value);
                    let newLength = Math.max(1, snake.length - customItem.value);
                    snake = snake.slice(0, newLength);
                    segmentsToAdd = 0; 
                }
            }

            if (ate) {
                scoreElement.innerText = score;
                spawnItemsPairs(); // Інший об'єкт автоматично зникає, бо ми генеруємо нову пару
            } else {
                if (segmentsToAdd > 0) {
                    segmentsToAdd--;
                } else {
                    if (snake.length > 1) snake.pop();
                }
            }

            draw();
        }

        function collision(head) {
            return snake.some((segment, index) => index !== 0 && segment.x === head.x && segment.y === head.y);
        }

        function draw() {
            if (isPaused) return;

            ctx.fillStyle = "#111";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Малюємо змійку
            snake.forEach((segment, index) => {
                ctx.fillStyle = (index === 0) ? "#388E3C" : "#4CAF50";
                ctx.fillRect(segment.x * gridSize, segment.y * gridSize, gridSize - 1, gridSize - 1);
            });

            // Налаштування тексту для Емодзі
            ctx.font = `${gridSize}px Arial`;
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";

            // Рендер звичайного яблука
            ctx.fillText(regularApple.emoji, regularApple.x * gridSize + gridSize/2, regularApple.y * gridSize + gridSize/2);

            // Рендер кастомного предмета
            if (customItem) {
                ctx.fillText(customItem.emoji, customItem.x * gridSize + gridSize/2, customItem.y * gridSize + gridSize/2);
            }
        }

        function changeDirection(newDx, newDy) {
            if (!isPlaying || isPaused) return;
            if (newDx !== 0 && dx === 0) { dx = newDx; dy = 0; }
            if (newDy !== 0 && dy === 0) { dx = 0; dy = newDy; }
        }

        // Слухачі подій кнопок
        document.getElementById("btn-up").addEventListener("click", () => changeDirection(0, -1));
        document.getElementById("btn-down").addEventListener("click", () => changeDirection(0, 1));
        document.getElementById("btn-left").addEventListener("click", () => changeDirection(-1, 0));
        document.getElementById("btn-right").addEventListener("click", () => changeDirection(1, 0));
        
        pauseButton.addEventListener("click", togglePause);
        startButton.addEventListener("click", startGame);

        // Кнопочне керування з клавіатури ПК
        document.addEventListener("keydown", (e) => {
            if (e.key === "ArrowUp" || e.key === "w") changeDirection(0, -1);
            if (e.key === "ArrowDown" || e.key === "s") changeDirection(0, 1);
            if (e.key === "ArrowLeft" || e.key === "a") changeDirection(-1, 0);
            if (e.key === "ArrowRight" || e.key === "d") changeDirection(1, 0);
            if (e.key === "p" || e.key === "P") togglePause();
        });

        initGame();
    </script>
</body>
</html>
