<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Моя Змійка: Бонусний Шанс</title>
    <style>
        body {
            margin: 0;
            background-color: #1a1a1a;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            touch-action: manipulation;
        }
        .header-panel {
            width: 400px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            padding: 0 5px;
            box-sizing: border-box;
        }
        #score-board {
            font-size: 24px;
            font-weight: bold;
        }
        .pause-btn {
            background-color: #555;
            color: white;
            border: none;
            padding: 8px 18px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 15px;
            cursor: pointer;
        }
        .pause-btn:active {
            background-color: #777;
        }
        .canvas-container {
            position: relative;
            width: 400px;
            height: 400px;
        }
        canvas {
            background-color: #111;
            border: 4px solid #333;
            border-radius: 8px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        #start-screen {
            position: absolute;
            top: 0; left: 0; width: 400px; height: 400px;
            background: rgba(0, 0, 0, 0.85);
            border: 4px solid transparent;
            box-sizing: border-box;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }
        .start-btn {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 15px 35px;
            font-size: 22px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(76, 175, 80, 0.4);
        }
        .controls {
            margin-top: 15px;
            display: grid;
            grid-template-columns: repeat(3, 75px);
            grid-template-rows: repeat(2, 75px);
            gap: 10px;
            justify-content: center;
        }
        .btn {
            background-color: #333;
            color: white;
            border: none;
            border-radius: 50%;
            font-size: 26px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .btn:active {
            background-color: #555;
        }
        #btn-up { grid-column: 2; grid-row: 1; }
        #btn-left { grid-column: 1; grid-row: 2; }
        #btn-down { grid-column: 2; grid-row: 2; }
        #btn-right { grid-column: 3; grid-row: 2; }
    </style>
</head>
<body>

    <div class="header-panel">
        <div id="score-board">Рахунок: <span id="score">0</span></div>
        <button class="pause-btn" id="pause-button">ПАУЗА ⏸️</button>
    </div>
    
    <div class="canvas-container">
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div id="start-screen">
            <button class="start-btn" id="start-button">СТАРТ</button>
        </div>
    </div>

    <div class="controls">
        <button class="btn" id="btn-up">↑</button>
        <button class="btn" id="btn-left">←</button>
        <button class="btn" id="btn-down">↓</button>
        <button class="btn" id="btn-right">→</button>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");
        const startScreen = document.getElementById("start-screen");
        const startButton = document.getElementById("start-button");
        const pauseButton = document.getElementById("pause-button");

        const gridSize = 16; 
        const tileCount = canvas.width / gridSize; 

        let snake = [];
        let regularApple = { x: 0, y: 0, emoji: '🍎', value: 1 };
        let customItem = null; 
        
        let dx = 1; 
        let dy = 0;
        let score = 0;
        let gameInterval = null;
        let customItemTimer = null; // Таймер зникнення кастомного об'єкта
        let isPlaying = false;
        let isPaused = false;
        let segmentsToAdd = 0;
        let animationFrame = 0;

        // Набір кастомних бонусів із вагою (рідкістю)
        const pool = [
            { emoji: '🍌', type: 'booster', value: 2, weight: 20 },
            { emoji: '🍊', type: 'booster', value: 3, weight: 18 },
            { emoji: '🍇', type: 'booster', value: 4, weight: 15 },
            { emoji: '🍒', type: 'booster', value: 5, weight: 12 },
            { emoji: '🍑', type: 'booster', value: 6, weight: 10 },
            { emoji: '🥝', type: 'booster', value: 7, weight: 8 },
            { emoji: '🍓', type: 'booster', value: 8, weight: 6 },
            { emoji: '🍈', type: 'booster', value: 9, weight: 4 },
            { emoji: '🍉', type: 'booster', value: 10, weight: 2 }, 
            { emoji: '🍍', type: 'booster', value: 10, weight: 2 }, 
            { emoji: '🍟', type: 'decreasor', value: 2, weight: 15 },
            { emoji: '🍕', type: 'decreasor', value: 5, weight: 8 },
            { emoji: '🍔', type: 'decreasor', value: 10, weight: 3 }  
        ];

        function initGame() {
            snake = [{x: 5, y: 12}, {x: 4, y: 12}, {x: 3, y: 12}];
            dx = 1;
            dy = 0;
            score = 0;
            segmentsToAdd = 0;
            isPaused = false;
            animationFrame = 0;
            clearCustomItem();
            
            scoreElement.innerText = score;
            pauseButton.innerText = "ПАУЗА ⏸️";
            
            startNewRound();
            draw();
        }

        function startGame() {
            if (isPlaying && !isPaused) return;
            if (isPaused) { togglePause(); return; }
            initGame();
            isPlaying = true;
            startScreen.style.display = "none";
            gameInterval = setInterval(update, 130);
        }

        function togglePause() {
            if (!isPlaying) return;
            if (!isPaused) {
                isPaused = true;
                clearInterval(gameInterval);
                pauseButton.innerText = "ПРОДОВЖИТИ ▶️";
                ctx.fillStyle = "rgba(0, 0, 0, 0.5)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.font = "30px Arial";
                ctx.fillStyle = "white";
                ctx.textAlign = "center";
                ctx.fillText("ПАУЗА", canvas.width / 2, canvas.height / 2);
            } else {
                isPaused = false;
                pauseButton.innerText = "ПАУЗА ⏸️";
                gameInterval = setInterval(update, 130);
            }
        }

        function gameOver() {
            isPlaying = false;
            clearInterval(gameInterval);
            clearCustomItem();
            startButton.innerText = "ГРАТИ ЗНОВУ";
            startScreen.style.display = "flex";
        }

        function getRandPos() {
            return { x: Math.floor(Math.random() * tileCount), y: Math.floor(Math.random() * tileCount) };
        }

        function isOccupied(pos) {
            return snake.some(s => s.x === pos.x && s.y === pos.y);
        }

        function clearCustomItem() {
            customItem = null;
            if (customItemTimer) {
                clearTimeout(customItemTimer);
                customItemTimer = null;
            }
        }

        function getRandomItemFromPool() {
            const totalWeight = pool.reduce((sum, item) => sum + item.weight, 0);
            let randomNum = Math.random() * totalWeight;
            for (let i = 0; i < pool.length; i++) {
                if (randomNum < pool[i].weight) return { ...pool[i] };
                randomNum -= pool[i].weight;
            }
            return { ...pool[0] };
        }

        // ЛОГІКА ХВИЛІ: Поява яблука + розрахунок шансу на бонус
        function startNewRound() {
            clearCustomItem();

            // 1. Спавнимо обов'язкове яблуко
            let applePos = getRandPos();
            while (isOccupied(applePos)) { applePos = getRandPos(); }
            regularApple.x = applePos.x;
            regularApple.y = applePos.y;

            // 2. Рахуємо шанс появи бонусу (наприклад, 30% що бонус взагалі з'явиться в цьому раунді)
            const spawnChance = Math.random() < 0.30; 
            
            if (spawnChance) {
                let target = getRandomItemFromPool();
                let customPos = getRandPos();
                
                while (isOccupied(customPos) || (customPos.x === regularApple.x && customPos.y === regularApple.y)) {
                    customPos = getRandPos();
                }
                
                target.x = customPos.x;
                target.y = customPos.y;
                customItem = target;

                // ОБМЕЖЕННЯ ЧАСУ: Бонус зникне сам через 5 секунд (5000 мс), якщо його не з'їсти
                customItemTimer = setTimeout(() => {
                    if (isPlaying && !isPaused && customItem) {
                        customItem = null; // Бонус просто випарувався, гра триває
                    }
                }, 5000);
            }
        }

        function update() {
            if (isPaused) return;
            animationFrame++;

            let nextX = snake[0].x + dx;
            let nextY = snake[0].y + dy;

            if (nextX < 0) nextX = tileCount - 1;
            if (nextX >= tileCount) nextX = 0;
            if (nextY < 0) nextY = tileCount - 1;
            if (nextY >= tileCount) nextY = 0;

            const head = { x: nextX, y: nextY };

            if (collision(head)) {
                gameOver();
                return;
            }

            snake.unshift(head);
            let roundFinished = false;

            // Перевірка 1: З'їли звичайне яблуко
            if (head.x === regularApple.x && head.y === regularApple.y) {
                score += regularApple.value;
                roundFinished = true;
            } 
            // Перевірка 2: З'їли бонус/фастфуд (поки він активний)
            else if (customItem && head.x === customItem.x && head.y === customItem.y) {
                roundFinished = true;
                if (customItem.type === 'booster') {
                    score += customItem.value;
                    segmentsToAdd += (customItem.value - 1);
                } else if (customItem.type === 'decreasor') {
                    score = Math.max(0, score - customItem.value);
                    let newLength = Math.max(1, snake.length - customItem.value);
                    snake = snake.slice(0, newLength);
                    segmentsToAdd = 0; 
                }
            }

            if (roundFinished) {
                scoreElement.innerText = score;
                startNewRound(); // Скидаємо все старе та починаємо новий раунд
            } else {
                if (segmentsToAdd > 0) {
                    segmentsToAdd--;
                } else {
                    if (snake.length > 1) snake.pop();
                }
            }

            draw();
        }

        function collision(head) {
            return snake.some((segment, index) => index !== 0 && segment.x === head.x && segment.y === head.y);
        }

        function draw() {
            if (isPaused) return;

            ctx.fillStyle = "#111";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Малюємо змійку
            snake.forEach((segment, index) => {
                let x = segment.x * gridSize;
                let y = segment.y * gridSize;
                let size = gridSize;

                ctx.save();
                if (index === 0) {
                    let pulse = Math.sin(animationFrame * 0.5) * 0.8;
                    ctx.fillStyle = "#388E3C";
                    ctx.beginPath();
                    ctx.arc(x + gridSize/2, y + gridSize/2, (gridSize/2) + pulse, 0, Math.PI * 2);
                    ctx.fill();

                    ctx.fillStyle = "white";
                    let eyeSize = 3; let eyeOffset = 4;
                    let eye1 = {x: 0, y: 0}, eye2 = {x: 0, y: 0};
                    
                    if (dx !== 0) {
                        eye1 = { x: x + gridSize/2 + dx*4, y: y + gridSize/2 - eyeOffset };
                        eye2 = { x: x + gridSize/2 + dx*4, y: y + gridSize/2 + eyeOffset };
                    } else {
                        eye1 = { x: x + gridSize/2 - eyeOffset, y: y + gridSize/2 + dy*4 };
                        eye2 = { x: x + gridSize/2 + eyeOffset, y: y + gridSize/2 + dy*4 };
                    }
                    ctx.beginPath();
                    ctx.arc(eye1.x, eye1.y, eyeSize, 0, Math.PI*2);
                    ctx.arc(eye2.x, eye2.y, eyeSize, 0, Math.PI*2);
                    ctx.fill();

                    ctx.fillStyle = "black";
                    ctx.beginPath();
                    ctx.arc(eye1.x + dx, eye1.y + dy, eyeSize/2, 0, Math.PI*2);
                    ctx.arc(eye2.x + dx, eye2.y + dy, eyeSize/2, 0, Math.PI*2);
                    ctx.fill();
                } else {
                    ctx.fillStyle = "#4CAF50";
                    let radius = 6;
                    if (index === snake.length - 1) {
                        size = gridSize * 0.7;
                        x += (gridSize - size) / 2; y += (gridSize - size) / 2;
                        radius = 4;
                    }
                    ctx.beginPath();
                    ctx.moveTo(x + radius, y); ctx.lineTo(x + size - radius, y);
                    ctx.quadraticCurveTo(x + size, y, x + size, y + radius);
                    ctx.lineTo(x + size, y + size - radius);
                    ctx.quadraticCurveTo(x + size, y + size, x + size - radius, y + size);
                    ctx.lineTo(x + radius, y + size - radius);
                    ctx.quadraticCurveTo(x, y + size, x, y + size - radius);
                    ctx.lineTo(x, y + radius); ctx.quadraticCurveTo(x, y, x + radius, y);
                    ctx.closePath(); ctx.fill();
                }
                ctx.restore();
            });

            // Рендер їжі
            ctx.font = `${gridSize}px Arial`;
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";

            // Яблуко малюється на початку кожної хвилі
            ctx.fillText(regularApple.emoji, regularApple.x * gridSize + gridSize/2, regularApple.y * gridSize + gridSize/2);
            
            // Якщо випав бонус і час не закінчився, малюємо його
            if (customItem) {
                ctx.fillText(customItem.emoji, customItem.x * gridSize + gridSize/2, customItem.y * gridSize + gridSize/2);
            }
        }

        function changeDirection(newDx, newDy) {
            if (!isPlaying || isPaused) return;
            if (newDx !== 0 && dx === 0) { dx = newDx; dy = 0; }
            if (newDy !== 0 && dy === 0) { dx = 0; dy = newDy; }
        }

        document.getElementById("btn-up").addEventListener("click", () => changeDirection(0, -1));
        document.getElementById("btn-down").addEventListener("click", () => changeDirection(0, 1));
        document.getElementById("btn-left").addEventListener("click", () => changeDirection(-1, 0));
        document.getElementById("btn-right").addEventListener("click", () => changeDirection(1, 0));
        
        pauseButton.addEventListener("click", togglePause);
        startButton.addEventListener("click", startGame);

        document.addEventListener("keydown", (e) => {
            if (e.key === "ArrowUp" || e.key === "w") changeDirection(0, -1);
            if (e.key === "ArrowDown" || e.key === "s") changeDirection(0, 1);
            if (e.key === "ArrowLeft" || e.key === "a") changeDirection(-1, 0);
            if (e.key === "ArrowRight" || e.key === "d") changeDirection(1, 0);
            if (e.key === "p" || e.key === "P") togglePause();
        });

        initGame();
    </script>
</body>
</html>
