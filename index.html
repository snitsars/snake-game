<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Змійка: Максимальний Простір</title>
    <style>
        body {
            margin: 0;
            background-color: #1a1a1a;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            /* Враховуємо безпечні зони чубчика/індикатора iPhone */
            padding: calc(10px + env(safe-area-inset-top)) 10px calc(10px + env(safe-area-inset-bottom)) 10px;
            box-sizing: border-box;
            overflow: hidden;
            touch-action: manipulation;
        }

        .header-panel {
            width: 100%;
            max-width: 600px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
            margin-bottom: 10px;
        }

        #score-board {
            font-size: 22px;
            font-weight: bold;
        }

        .nav-buttons {
            display: flex;
            gap: 8px;
        }

        .header-btn {
            background-color: #333;
            color: white;
            border: none;
            padding: 8px 14px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
        }

        .header-btn:active {
            background-color: #555;
        }

        /* Контейнер тепер забирає ВЕСЬ вільний простір по висоті */
        .canvas-container {
            position: relative;
            width: 100%;
            max-width: 600px;
            flex-grow: 1; 
            min-height: 0; /* Важливо для flexbox */
        }

        canvas {
            width: 100%;
            height: 100%;
            background-color: #111;
            border: 3px solid #333;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.6);
            display: block;
            box-sizing: border-box;
        }

        #start-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .start-btn {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 14px 32px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 22px;
            cursor: pointer;
        }

        /* Ергономічний джойстик для мобільних */
        .controls {
            margin-top: 10px;
            display: grid;
            grid-template-columns: repeat(3, 70px);
            grid-template-rows: repeat(2, 70px);
            gap: 8px;
            justify-content: center;
            flex-shrink: 0;
        }

        .btn {
            background-color: #2b2b2b;
            color: white;
            border: none;
            border-radius: 50%;
            font-size: 24px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.4);
        }

        .btn:active {
            background-color: #444;
        }

        #btn-up { grid-column: 2; grid-row: 1; }
        #btn-left { grid-column: 1; grid-row: 2; }
        #btn-down { grid-column: 2; grid-row: 2; }
        #btn-right { grid-column: 3; grid-row: 2; }

        /* Ховаємо джойстик на ПК, де є клавіатура, щоб дати грі ще більше місця */
        @media (min-width: 768px) {
            .controls {
                display: none;
            }
            body {
                padding: 20px;
            }
        }
    </style>
</head>
<body>

    <div class="header-panel">
        <div id="score-board">Рахунок: <span id="score">0</span></div>
        <div class="nav-buttons">
            <button class="header-btn" id="restart-button-top">РЕСТАРТ 🔄</button>
            <button class="header-btn" id="pause-button">ПАУЗА ⏸️</button>
        </div>
    </div>
    
    <div class="canvas-container">
        <canvas id="gameCanvas"></canvas>
        <div id="start-screen">
            <button class="start-btn" id="start-button">СТАРТ</button>
        </div>
    </div>

    <div class="controls">
        <button class="btn" id="btn-up">↑</button>
        <button class="btn" id="btn-left">←</button>
        <button class="btn" id="btn-down">↓</button>
        <button class="btn" id="btn-right">→</button>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");
        const startScreen = document.getElementById("start-screen");
        const startButton = document.getElementById("start-button");
        const pauseButton = document.getElementById("pause-button");
        const restartButtonTop = document.getElementById("restart-button-top");

        const gridSize = 18; // Розмір однієї клітинки в пікселях всередині логіки
        let colsCount = 0;   // Кількість колонок (розраховується динамічно)
        let rowsCount = 0;   // Кількість рядків (розраховується динамічно)

        let snake = [];
        let regularApple = { x: 0, y: 0, emoji: '🍎', value: 1 };
        let customItem = null; 
        
        let dx = 1; 
        let dy = 0;
        let score = 0;
        let gameInterval = null;
        let customItemTimer = null; 
        let isPlaying = false;
        let isPaused = false;
        let segmentsToAdd = 0;
        let animationFrame = 0;

        const pool = [
            { emoji: '🍌', type: 'booster', value: 2, weight: 20 },
            { emoji: '🍊', type: 'booster', value: 3, weight: 18 },
            { emoji: '🍇', type: 'booster', value: 4, weight: 15 },
            { emoji: '🍒', type: 'booster', value: 5, weight: 12 },
            { emoji: '🍑', type: 'booster', value: 6, weight: 10 },
            { emoji: '🥝', type: 'booster', value: 7, weight: 8 },
            { emoji: '🍓', type: 'booster', value: 8, weight: 6 },
            { emoji: '🍈', type: 'booster', value: 9, weight: 4 },
            { emoji: '🍉', type: 'booster', value: 10, weight: 2 }, 
            { emoji: '🍍', type: 'booster', value: 10, weight: 2 }, 
            { emoji: '🍟', type: 'decreasor', value: 2, weight: 15 },
            { emoji: '🍕', type: 'decreasor', value: 5, weight: 8 },
            { emoji: '🍔', type: 'decreasor', value: 10, weight: 3 }  
        ];

        // Динамічний перерахунок матриці поля під розмір екрану
        function resizeCanvas() {
            const rect = canvas.getBoundingClientRect();
            // Встановлюємо реальну внутрішню роздільну здатність канвасу відповідно до його CSS розмірів
            canvas.width = Math.floor(rect.width);
            canvas.height = Math.floor(rect.height);

            // Вираховуємо скільки цілих клітинок вміщує нове поле
            colsCount = Math.floor(canvas.width / gridSize);
            rowsCount = Math.floor(canvas.height / gridSize);

            if (isPlaying) draw();
        }

        window.addEventListener('resize', resizeCanvas);

        function initGame() {
            resizeCanvas(); // Оновлюємо розміри перед стартом
            
            // Центруємо початкову змійку незалежно від форми поля
            const startY = Math.floor(rowsCount / 2);
            snake = [{x: 5, y: startY}, {x: 4, y: startY}, {x: 3, y: startY}];
            
            dx = 1;
            dy = 0;
            score = 0;
            segmentsToAdd = 0;
            isPaused = false;
            animationFrame = 0;
            clearCustomItem();
            
            scoreElement.innerText = score;
            pauseButton.innerText = "ПАУЗА ⏸️";
            
            startNewRound();
            draw();
        }

        function startGame() {
            if (isPlaying && !isPaused) return;
            if (isPaused) { togglePause(); return; }
            initGame();
            isPlaying = true;
            startScreen.style.display = "none";
            gameInterval = setInterval(update, 130);
        }

        function forceRestart() {
            clearInterval(gameInterval);
            initGame();
            isPlaying = true;
            startScreen.style.display = "none";
            gameInterval = setInterval(update, 130);
        }

        function togglePause() {
            if (!isPlaying) return;
            if (!isPaused) {
                isPaused = true;
                clearInterval(gameInterval);
                pauseButton.innerText = "ГРАТИ ▶️";
                ctx.fillStyle = "rgba(0, 0, 0, 0.6)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.font = "bold 30px Arial";
                ctx.fillStyle = "white";
                ctx.textAlign = "center";
                ctx.fillText("ПАУЗА", canvas.width / 2, canvas.height / 2);
            } else {
                isPaused = false;
                pauseButton.innerText = "ПАУЗА ⏸️";
                gameInterval = setInterval(update, 130);
            }
        }

        function gameOver() {
            isPlaying = false;
            clearInterval(gameInterval);
            clearCustomItem();
            startButton.innerText = "ГРАТИ ЗНОВУ";
            startScreen.style.display = "flex";
        }

        function getRandPos() {
            return { 
                x: Math.floor(Math.random() * colsCount), 
                y: Math.floor(Math.random() * rowsCount) 
            };
        }

        function isOccupied(pos) {
            return snake.some(s => s.x === pos.x && s.y === pos.y);
        }

        function clearCustomItem() {
            customItem = null;
            if (customItemTimer) {
                clearTimeout(customItemTimer);
                customItemTimer = null;
            }
        }

        function getRandomItemFromPool() {
            const totalWeight = pool.reduce((sum, item) => sum + item.weight, 0);
            let randomNum = Math.random() * totalWeight;
            for (let i = 0; i < pool.length; i++) {
                if (randomNum < pool[i].weight) return { ...pool[i] };
                randomNum -= pool[i].weight;
            }
            return { ...pool[0] };
        }

        function startNewRound() {
            clearCustomItem();

            let applePos = getRandPos();
            while (isOccupied(applePos)) { applePos = getRandPos(); }
            regularApple.x = applePos.x;
            regularApple.y = applePos.y;

            const spawnChance = Math.random() < 0.35; 
            
            if (spawnChance) {
                let target = getRandomItemFromPool();
                let customPos = getRandPos();
                
                while (isOccupied(customPos) || (customPos.x === regularApple.x && customPos.y === regularApple.y)) {
                    customPos = getRandPos();
                }
                
                target.x = customPos.x;
                target.y = customPos.y;
                customItem = target;

                customItemTimer = setTimeout(() => {
                    if (isPlaying && !isPaused && customItem) {
                        customItem = null; 
                    }
                }, 5000);
            }
        }

        function update() {
            if (isPaused) return;
            animationFrame++;

            let nextX = snake[0].x + dx;
            let nextY = snake[0].y + dy;

            // Телепортація крізь краї з урахуванням нових динамічних меж
            if (nextX < 0) nextX = colsCount - 1;
            if (nextX >= colsCount) nextX = 0;
            if (nextY < 0) nextY = rowsCount - 1;
            if (nextY >= rowsCount) nextY = 0;

            const head = { x: nextX, y: nextY };

            if (collision(head)) {
                gameOver();
                return;
            }

            snake.unshift(head);
            let roundFinished = false;

            if (head.x === regularApple.x && head.y === regularApple.y) {
                score += regularApple.value;
                roundFinished = true;
            } 
            else if (customItem && head.x === customItem.x && head.y === customItem.y) {
                roundFinished = true;
                if (customItem.type === 'booster') {
                    score += customItem.value;
                    segmentsToAdd += (customItem.value - 1);
                } else if (customItem.type === 'decreasor') {
                    score = Math.max(0, score - customItem.value);
                    let newLength = Math.max(1, snake.length - customItem.value);
                    snake = snake.slice(0, newLength);
                    segmentsToAdd = 0; 
                }
            }

            if (roundFinished) {
                scoreElement.innerText = score;
                startNewRound(); 
            } else {
                if (segmentsToAdd > 0) {
                    segmentsToAdd--;
                } else {
                    if (snake.length > 1) snake.pop();
                }
            }

            draw();
        }

        function collision(head) {
            return snake.some((segment, index) => index !== 0 && segment.x === head.x && segment.y === head.y);
        }

        function draw() {
            // Очищення фону
            ctx.fillStyle = "#111";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Центрування сітки у випадку залишків пікселів по краях канвасу
            const offsetX = (canvas.width - (colsCount * gridSize)) / 2;
            const offsetY = (canvas.height - (rowsCount * gridSize)) / 2;

            // Малюємо змійку
            snake.forEach((segment, index) => {
                let x = offsetX + segment.x * gridSize;
                let y = offsetY + segment.y * gridSize;
                let size = gridSize;

                ctx.save();
                if (index === 0) {
                    let pulse = Math.sin(animationFrame * 0.5) * 0.8;
                    ctx.fillStyle = "#388E3C";
                    ctx.beginPath();
                    ctx.arc(x + gridSize/2, y + gridSize/2, (gridSize/2) + pulse, 0, Math.PI * 2);
                    ctx.fill();

                    ctx.fillStyle = "white";
                    let eyeSize = 3; let eyeOffset = 4;
                    let eye1 = {x: 0, y: 0}, eye2 = {x: 0, y: 0};
                    
                    if (dx !== 0) {
                        eye1 = { x: x + gridSize/2 + dx*4, y: y + gridSize/2 - eyeOffset };
                        eye2 = { x: x + gridSize/2 + dx*4, y: y + gridSize/2 + eyeOffset };
                    } else {
                        eye1 = { x: x + gridSize/2 - eyeOffset, y: y + gridSize/2 + dy*4 };
                        eye2 = { x: x + gridSize/2 + eyeOffset, y: y + gridSize/2 + dy*4 };
                    }
                    ctx.beginPath();
                    ctx.arc(eye1.x, eye1.y, eyeSize, 0, Math.PI*2);
                    ctx.arc(eye2.x, eye2.y, eyeSize, 0, Math.PI*2);
                    ctx.fill();

                    ctx.fillStyle = "black";
                    ctx.beginPath();
                    ctx.arc(eye1.x + dx, eye1.y + dy, eyeSize/2, 0, Math.PI*2);
                    ctx.arc(eye2.x + dx, eye2.y + dy, eyeSize/2, 0, Math.PI*2);
                    ctx.fill();
                } else {
                    ctx.fillStyle = "#4CAF50";
                    let radius = 6;
                    if (index === snake.length - 1) {
                        size = gridSize * 0.7;
                        x += (gridSize - size) / 2; y += (gridSize - size) / 2;
                        radius = 4;
                    }
                    ctx.beginPath();
                    ctx.moveTo(x + radius, y); ctx.lineTo(x + size - radius, y);
                    ctx.quadraticCurveTo(x + size, y, x + size, y + radius);
                    ctx.lineTo(x + size, y + size - radius);
                    ctx.quadraticCurveTo(x + size, y + size, x + size - radius, y + size);
                    ctx.lineTo(x + radius, y + size - radius);
                    ctx.quadraticCurveTo(x, y + size, x, y + size - radius);
                    ctx.lineTo(x, y + radius); ctx.quadraticCurveTo(x, y, x + radius, y);
                    ctx.closePath(); ctx.fill();
                }
                ctx.restore();
            });

            // Рендер об'єктів їжі
            ctx.font = `${gridSize}px Arial`;
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";

            ctx.fillText(regularApple.emoji, offsetX + regularApple.x * gridSize + gridSize/2, offsetY + regularApple.y * gridSize + gridSize/2);
            
            if (customItem) {
                ctx.fillText(customItem.emoji, offsetX + customItem.x * gridSize + gridSize/2, offsetY + customItem.y * gridSize + gridSize/2);
            }
        }

        function changeDirection(newDx, newDy) {
            if (!isPlaying || isPaused) return;
            if (newDx !== 0 && dx === 0) { dx = newDx; dy = 0; }
            if (newDy !== 0 && dy === 0) { dx = 0; dy = newDy; }
        }

        document.getElementById("btn-up").addEventListener("click", () => changeDirection(0, -1));
        document.getElementById("btn-down").addEventListener("click", () => changeDirection(0, 1));
        document.getElementById("btn-left").addEventListener("click", () => changeDirection(-1, 0));
        document.getElementById("btn-right").addEventListener("click", () => changeDirection(1, 0));
        
        pauseButton.addEventListener("click", togglePause);
        startButton.addEventListener("click", startGame);
        restartButtonTop.addEventListener("click", forceRestart);

        document.addEventListener("keydown", (e) => {
            if (e.key === "ArrowUp" || e.key === "w") changeDirection(0, -1);
            if (e.key === "ArrowDown" || e.key === "s") changeDirection(0, 1);
            if (e.key === "ArrowLeft" || e.key === "a") changeDirection(-1, 0);
            if (e.key === "ArrowRight" || e.key === "d") changeDirection(1, 0);
            if (e.key === "p" || e.key === "P") togglePause();
            if (e.key === "r" || e.key === "R") forceRestart();
        });

        // Первинний розрахунок при завантаженні сторінки
        resizeCanvas();
        initGame();
    </script>
</body>
</html>
